# Railway: deploy dell API Rust (non il frontend Vercel).
# Dashboard → Settings → se vedi ancora l app su /health, imposta Builder = Dockerfile.

[build]
builder = "DOCKERFILE"
dockerfilePath = "web/server/Dockerfile"
watchPatterns = ["src-tauri/**", "web/server/Dockerfile", "railway.toml"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 600
restartPolicyType = "ON_FAILURE"
